# course.conf — Nginx 反向代理配置
# 部署路径: /etc/nginx/sites-available/course.conf
# 启用: ln -s /etc/nginx/sites-available/course.conf /etc/nginx/sites-enabled/
#
# 链路: 浏览器 → Nginx(:80) → frps(:6005) → frpc(WSL) → server.py(:8080)

upstream course_backend {
    # frps 在云主机本地暴露的隧道端口
    server 127.0.0.1:6005;
    keepalive 32;
}

server {
    listen 80;
    server_name aiotedu.cc www.aiotedu.cc;

    # 日志
    access_log /var/log/nginx/course_access.log;
    error_log  /var/log/nginx/course_error.log;

    # 上传限制（课程资源通常无上传，预留）
    client_max_body_size 100m;
    client_body_timeout 60s;

    # ==== 主代理 ====
    location / {
        proxy_pass http://course_backend;
        proxy_http_version 1.1;

        # 基础头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # 超时（视频播放可能持续数小时）
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        proxy_connect_timeout   30s;
    }

    # ==== 视频流专用优化 ====
    location /api/video/ {
        proxy_pass http://course_backend;
        proxy_http_version 1.1;

        # 基础头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # === 视频流关键配置 ===
        # 关闭缓冲 — 视频文件很大，缓冲会耗尽内存
        proxy_buffering         off;
        proxy_cache             off;
        proxy_request_buffering off;

        # 支持 Range 请求（断点续传/拖动进度条）
        proxy_set_header Range  $http_range;
        proxy_set_header If-Range $http_if_range;

        # 长超时 — 一部视频可能 2-3 小时
        proxy_read_timeout      14400s;  # 4小时
        proxy_send_timeout      14400s;

        # 保持连接
        proxy_set_header Connection        "";
    }

    # ==== API 接口 ====
    location /api/ {
        proxy_pass http://course_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout      30s;
    }
}
