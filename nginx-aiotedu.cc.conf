# ============================================================
# aiotedu.cc — 智联学习云 课程服务 (反向代理到 frps 隧道)
# 链路: Nginx → frps(:6005) → frpc(WSL) → server.py(:8080)
# ============================================================

server {
    listen 80;
    listen 443 ssl http2 ;
    listen [::]:80;

    server_name aiotedu.cc;
    index index.html index.htm;
    root /www/wwwroot/aiotedu.cc;

    #CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/aiotedu.cc.conf;
    include /www/server/panel/vhost/nginx/well-known/www.aiotedu.cc.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/aiotedu.cc/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/aiotedu.cc/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #REDIRECT START
    #REDIRECT END

    #REWRITE START
    #REWRITE END

    # ============================================================
    # 视频流反向代理到 frps 隧道 (127.0.0.1:6005)
    # ============================================================

    #DENY-FILES
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    #SSL-VERIFY
    location /.well-known{
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    #PROXY-START
    location / {
        proxy_pass http://127.0.0.1:6005;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 视频播放超长超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 14400s;
        proxy_read_timeout 14400s;
    }

    #PROXY-END

    # ============================================================
    # 视频流专用: 关闭缓冲, 支持 Range 断点续传
    # ============================================================
    location /api/video/ {
        proxy_pass http://127.0.0.1:6005;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 视频流: 关闭缓冲
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        # 透传 Range 请求头
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # 超长超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 14400s;
        proxy_read_timeout 14400s;

        proxy_set_header Connection "";
    }

    #LOG START
    access_log  /www/wwwlogs/aiotedu.cc.log;
    error_log  /www/wwwlogs/aiotedu.cc.error.log;
    #LOG END
}
