<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智联学习云</title>
<style>
  /* ===== Reset & Variables ===== */
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --primary:#4f46e5;--primary-light:#818cf8;--primary-dark:#3730a3;
    --accent:#f59e0b;--success:#22c55e;
    --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--hover:#475569;
    --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
    --border:#334155;--radius:12px;--shadow:0 4px 20px rgba(0,0,0,.4);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  a{color:var(--primary-light);text-decoration:none}

  /* ===== Top Nav ===== */
  .topnav{
    background:linear-gradient(135deg,var(--primary-dark),var(--primary));
    padding:0 32px;height:56px;display:flex;align-items:center;
    justify-content:space-between;flex-shrink:0;
    box-shadow:0 2px 12px rgba(79,70,229,.3);position:sticky;top:0;z-index:200;
  }
  .topnav .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .topnav .brand span{color:var(--accent)}
  .topnav .brand small{font-weight:400;font-size:13px;color:#c7d2fe}
  .topnav .info{font-size:13px;color:#c7d2fe;display:flex;gap:16px}
  .topnav .info b{color:#fff}

  /* ===== Layout ===== */
  .layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 56px)}

  /* ===== Sidebar ===== */
  .sidebar{
    width:380px;min-width:380px;background:var(--bg2);
    border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;
    display:flex;flex-direction:column;
  }
  .sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border)}
  .sidebar-header select{
    width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);
    background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer;
    outline:none;transition:border-color .2s;
  }
  .sidebar-header select:focus{border-color:var(--primary-light)}

  .sidebar-body{flex:1;overflow-y:auto;padding:12px 0 80px}

  /* Chapter */
  .chapter{margin:0 8px 4px;border-radius:var(--radius);overflow:hidden;border:1px solid transparent}
  .chapter.open{border-color:var(--border)}
  .chapter-header{
    display:flex;align-items:center;gap:10px;padding:10px 14px;
    cursor:pointer;border-radius:var(--radius);transition:background .2s;user-select:none;
  }
  .chapter-header:hover{background:var(--bg3)}
  .chapter.open>.chapter-header{background:rgba(79,70,229,.1);border-radius:var(--radius) var(--radius) 0 0}
  .chapter-header .arrow{font-size:10px;color:var(--text3);transition:transform .2s;width:16px;text-align:center}
  .chapter.open>.chapter-header .arrow{transform:rotate(90deg)}
  .chapter-header .num{
    width:26px;height:26px;border-radius:6px;background:var(--primary);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;
  }
  .chapter-header .ct{flex:1;min-width:0}
  .chapter-header .ct .ct-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chapter-header .ct .ct-count{font-size:11px;color:var(--text3);margin-top:1px}

  .chapter-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .chapter.open>.chapter-body{max-height:3000px}

  .video-item{
    display:flex;align-items:center;gap:10px;padding:9px 14px 9px 46px;
    cursor:pointer;transition:all .15s;border-left:3px solid transparent;position:relative;
  }
  .video-item:hover{background:var(--bg3)}
  .video-item.active{
    background:rgba(79,70,229,.15);border-left-color:var(--primary-light);
  }
  .video-item .vi{width:22px;font-size:12px;color:var(--text3);text-align:right;flex-shrink:0}
  .video-item .vname{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .video-item .vsize{font-size:11px;color:var(--text3);flex-shrink:0}
  .video-item .vstatus{
    width:18px;height:18px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:9px;
  }
  .video-item .vstatus.idle{border:2px solid var(--text3)}
  .video-item .vstatus.playing{background:var(--accent);color:#000;font-size:10px}
  .video-item .vstatus.watched{background:var(--success);color:#fff;font-size:10px}

  /* ===== Main Content ===== */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

  /* Player Area */
  .player-area{
    background:#000;position:relative;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;max-height:calc(100vh - 56px - 200px);min-height:360px;
  }
  .player-area video{width:100%;max-height:calc(100vh - 56px - 200px);display:block;outline:none}
  .player-placeholder{
    width:100%;padding:60px 20px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;color:var(--text3);
    min-height:360px;background:linear-gradient(135deg,#1a1a2e,#16213e);
  }
  .player-placeholder .icon{font-size:56px;opacity:.4}
  .player-placeholder p{font-size:15px}
  .player-placeholder small{font-size:13px;opacity:.6}

  /* Info area below player */
  .info-area{padding:24px 32px 40px;overflow-y:auto;flex:1}
  .info-area .video-title{font-size:20px;font-weight:700;margin-bottom:4px}
  .info-area .video-meta{font-size:13px;color:var(--text2);margin-bottom:20px}
  .info-area .video-desc{font-size:14px;color:var(--text2);line-height:1.8}
  .info-area .chapter-detail{margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
  .info-area .chapter-detail h4{font-size:14px;color:var(--text3);margin-bottom:8px}
  .info-area .chapter-detail p{font-size:14px;color:var(--text2);line-height:1.7}

  /* ===== Scrollbar ===== */
  .sidebar-body::-webkit-scrollbar,.info-area::-webkit-scrollbar{width:6px}

  /* ===== Wiki Resource Content ===== */
  .resource-content h1{font-size:22px;font-weight:800;margin-bottom:8px;padding-bottom:8px;border-bottom:2px solid var(--border)}
  .resource-content h2{font-size:18px;font-weight:700;margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .resource-content h3{font-size:16px;font-weight:700;margin:20px 0 8px}
  .resource-content h4{font-size:15px;font-weight:600;margin:16px 0 6px}
  .resource-content h5,.resource-content h6{font-size:14px;font-weight:600;margin:14px 0 4px;color:var(--text2)}
  .resource-content p{line-height:1.8;margin-bottom:12px;font-size:14px;color:var(--text2)}
  .resource-content strong{color:var(--text)}
  .resource-content a{color:var(--primary-light);text-decoration:underline}
  .resource-content ul,.resource-content ol{padding-left:20px;margin-bottom:14px}
  .resource-content li{line-height:1.7;margin-bottom:3px;font-size:14px;color:var(--text2)}
  .resource-content blockquote{border-left:4px solid var(--primary);background:rgba(79,70,229,.08);padding:10px 16px;margin:14px 0;border-radius:0 var(--radius) var(--radius) 0}
  .resource-content blockquote p{font-size:13px;margin:0;color:var(--text3)}
  .resource-content hr{border:none;border-top:1px solid var(--border);margin:20px 0}
  .resource-content .code-block{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;overflow-x:auto;margin:14px 0;font-size:13px;line-height:1.6;font-family:'Fira Code',Consolas,monospace}
  .resource-content .code-block code{color:#c9d1d9}
  .resource-content .inline-code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'Fira Code',Consolas,monospace;color:var(--accent)}
  .resource-content table.wiki-table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
  .resource-content table.wiki-table th{background:var(--bg3);padding:8px 12px;text-align:left;font-weight:600;border:1px solid var(--border);color:var(--text)}
  .resource-content table.wiki-table td{padding:6px 12px;border:1px solid var(--border);color:var(--text2)}
  .resource-content .is-success{background:rgba(34,197,94,.08);border-left:4px solid #22c55e;padding:10px 16px;border-radius:0 var(--radius) var(--radius) 0;margin:14px 0}
  .resource-content .is-success p,.resource-content .is-success li{color:#bbf7d0}
  .resource-content .is-info{background:rgba(59,130,246,.08);border-left:4px solid #3b82f6;padding:10px 16px;border-radius:0 var(--radius) var(--radius) 0;margin:14px 0}
  .resource-content .is-info p,.resource-content .is-info li{color:#bfdbfe}
  .resource-content .is-warning{background:rgba(245,158,11,.08);border-left:4px solid #f59e0b;padding:10px 16px;border-radius:0 var(--radius) var(--radius) 0;margin:14px 0}
  .resource-content .is-warning p,.resource-content .is-warning li{color:#fde68a}
  .resource-content .is-danger{background:rgba(239,68,68,.08);border-left:4px solid #ef4444;padding:10px 16px;border-radius:0 var(--radius) var(--radius) 0;margin:14px 0}
  .resource-content .is-danger p,.resource-content .is-danger li{color:#fecaca}
  .resource-content ul.grid-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding-left:0;list-style:none}
  .resource-content ul.grid-list li{background:var(--bg3);padding:8px 12px;border-radius:var(--radius);list-style-type:none}
  .resource-content img.wiki-img{max-width:100%;border-radius:var(--radius);margin:12px 0;border:1px solid var(--border)}
  .sidebar-body::-webkit-scrollbar-track,.info-area::-webkit-scrollbar-track{background:transparent}
  .sidebar-body::-webkit-scrollbar-thumb,.info-area::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

  /* ===== Responsive ===== */
  @media(max-width:900px){
    .sidebar{width:320px;min-width:320px}
  }
  @media(max-width:700px){
    .topnav{padding:0 16px}
    .topnav .brand small{display:none}
    .sidebar{width:100%;min-width:100%;max-height:50%;border-right:none;border-bottom:1px solid var(--border)}
    .layout{flex-direction:column}
    .player-area{min-height:240px;max-height:50vh}
  }
</style>
</head>
<body>

<!-- ===== Top Nav ===== -->
<nav class="topnav">
  <div class="brand">
    <a id="backLink" href="/" style="color:inherit;text-decoration:none;margin-right:8px;font-size:16px" title="返回首页">←</a>
    <span>智联学习云</span>
    <small id="navBreadcrumb">· 精品课程平台</small>
  </div>
  <div class="info">
    <span id="navUser"></span>
    <span>📚 <b id="totalCourses">-</b> 门课程</span>
    <span>📹 <b id="totalVideos">-</b> 个视频</span>
  </div>
  </div>
</nav>

<!-- ===== Layout ===== -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <select id="courseSelect" onchange="switchCourse(this.value)"></select>
    </div>
    <div class="sidebar-body" id="sidebarBody">
      <div style="padding:40px;text-align:center;color:var(--text3)">⏳ 加载课程目录...</div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- Player -->
    <div class="player-area" id="playerArea">
      <div class="player-placeholder" id="playerPlaceholder">
        <div class="icon">📺</div>
        <p>从左侧目录选择视频开始学习</p>
        <small>支持进度拖拽 · 高清播放</small>
      </div>
      <video id="videoPlayer" controls preload="auto" playsinline style="display:none"></video>
    </div>

    <!-- Info -->
    <div class="info-area" id="infoArea">
      <div style="padding:20px;text-align:center;color:var(--text3)">
        <p>👈 请从左侧课程目录中选择一个视频开始学习</p>
      </div>
    </div>
  </main>

</div>

<footer style="text-align:center;padding:16px;color:var(--text3);font-size:12px;border-top:1px solid var(--border);flex-shrink:0">
  智联学习云 © 2026 · 学无止境<br>
  <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener" style="color:var(--text3);text-decoration:none;font-size:11px">浙ICP备2022030063号-1</a>
</footer>

<script src="auth.js"></script>
<script src="wiki_render.js"></script>
<script>
// ======================== State ========================
let courses = [];
let currentCourse = null;
let currentVideo = null;
let player = document.getElementById('videoPlayer');
const sidebarBody = document.getElementById('sidebarBody');
const infoArea = document.getElementById('infoArea');
const placeholder = document.getElementById('playerPlaceholder');

// ======================== Init ========================
Auth.renderUserArea('navUser');
player.addEventListener('play', () => {
  if (currentVideo) markWatched(currentVideo.file);
});
loadCourses();

// ======================== Load Data ========================
async function loadCourses() {
  try {
    const res = await fetch('/api/courses');
    courses = await res.json();
    document.getElementById('totalCourses').textContent = courses.length;
    document.getElementById('totalVideos').textContent = courses.reduce((s,c)=>s+c.total_videos,0);
    const sel = document.getElementById('courseSelect');
    sel.innerHTML = courses.map((c,i) => `<option value="${c.id}">${c.title}</option>`).join('');
    if (courses.length) {
      // 读取 URL 参数 ?id=xxx&series=yyy
      const params = new URLSearchParams(window.location.search);
      const courseId = params.get('id');
      const seriesId = params.get('series');
      const target = courseId && courses.find(c => c.id === courseId) ? courses.find(c => c.id === courseId) : courses[0];
      document.getElementById('courseSelect').value = target.id;

      // 面包屑导航
      if (seriesId) {
        fetch(`/api/series?id=${seriesId}`).then(r => r.json()).then(s => {
          if (!s.error) {
            document.getElementById('backLink').href = `series.html?id=${seriesId}`;
            document.getElementById('navBreadcrumb').textContent = `· ${s.title} · ${target.title}`;
          }
        });
      } else {
        document.getElementById('navBreadcrumb').textContent = `· ${target.title}`;
      }

      switchCourse(target.id);
    }
  } catch(e) {
    sidebarBody.innerHTML = `<div style="padding:40px;text-align:center;color:#f87171">❌ 加载失败<br><small>${e.message}</small></div>`;
  }
}

// ======================== Switch Course ========================
function switchCourse(courseId) {
  const course = courses.find(c => c.id === courseId);
  if (!course) return;
  currentCourse = course;
  currentVideo = null;

  // Update player
  player.pause();
  player.style.display = 'none';
  player.removeAttribute('src');
  placeholder.style.display = 'flex';

  // Update sidebar
  renderSidebar(course);

  // Update info
  renderCourseInfo(course);
}

// ======================== Render Sidebar ========================
function renderSidebar(course) {
  let html = '';
  const singleChapter = course.chapters.length === 1;

  course.chapters.forEach((ch, ci) => {
    if (singleChapter) {
      // 单章节课程：直接平铺视频，不显示章节折叠菜单
      html += `<div style="padding:8px 14px;font-size:13px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);margin:0 8px 8px">${course.title}</div>`;
      html += `<div class="video-list">`;
      ch.videos.forEach((v, vi) => {
        const isActive = currentVideo && currentVideo.file === v.file;
        const statusClass = isActive ? 'playing' : (getWatched(v.file) ? 'watched' : 'idle');
        const statusIcon = isActive ? '►' : (getWatched(v.file) ? '✓' : '');
        html += `<div class="video-item${isActive ? ' active' : ''}" data-file="${escapeAttr(v.file)}" data-name="${escapeAttr(v.name)}" data-chapter="${escapeAttr(ch.title)}" onclick="playVideo(this)">`;
        html += `<span class="vi">${vi+1}</span>`;
        html += `<span class="vname">${v.name}</span>`;
        html += `<span class="vsize">${v.size_str}</span>`;
        html += `<span class="vstatus ${statusClass}">${statusIcon}</span>`;
        html += `</div>`;
      });
      html += `</div>`;
    } else {
      // 多章节课程：保留折叠菜单
      html += `<div class="chapter open" data-chapter="${escapeAttr(ch.id)}">`;
      html += `<div class="chapter-header" onclick="toggleChapter(this.parentElement)">`;
      html += `<span class="arrow">▶</span>`;
      html += `<span class="num">${ci+1}</span>`;
      html += `<div class="ct"><div class="ct-title">${ch.title}</div><div class="ct-count">${ch.count} 讲</div></div>`;
      html += `</div>`;
      html += `<div class="chapter-body"><div class="video-list">`;
      ch.videos.forEach((v, vi) => {
        const isActive = currentVideo && currentVideo.file === v.file;
        const statusClass = isActive ? 'playing' : (getWatched(v.file) ? 'watched' : 'idle');
        const statusIcon = isActive ? '►' : (getWatched(v.file) ? '✓' : '');
        html += `<div class="video-item${isActive ? ' active' : ''}" data-file="${escapeAttr(v.file)}" data-name="${escapeAttr(v.name)}" data-chapter="${escapeAttr(ch.title)}" onclick="playVideo(this)">`;
        html += `<span class="vi">${vi+1}</span>`;
        html += `<span class="vname">${v.name}</span>`;
        html += `<span class="vsize">${v.size_str}</span>`;
        html += `<span class="vstatus ${statusClass}">${statusIcon}</span>`;
        html += `</div>`;
      });
      html += `</div></div></div>`;
    }
  });
  sidebarBody.innerHTML = html;
}

// ======================== Play Video ========================
function playVideo(el) {
  const file = el.dataset.file;
  const name = el.dataset.name;
  const chapter = el.dataset.chapter;

  // 判断是否为本课程第一个视频（第一个章节的第一个视频）
  let isFirstVideo = false;
  if (currentCourse && currentCourse.chapters.length > 0) {
    const firstChapter = currentCourse.chapters[0];
    if (firstChapter.videos && firstChapter.videos.length > 0) {
      isFirstVideo = (file === firstChapter.videos[0].file);
    }
  }

  // 非第一个视频需要登录
  if (!isFirstVideo && !Auth.loggedIn()) {
    Auth.requireLogin().then(ok => {
      if (ok) playVideo(el); // 登录成功后重新播放
    });
    return;
  }

  currentVideo = { file, name, chapter };

  // Update sidebar highlight
  document.querySelectorAll('.video-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');

  // Update info area immediately
  renderVideoInfo(name, chapter);

  // === Reset video element properly ===
  // First, completely clear the previous video to avoid state conflicts
  player.pause();
  player.removeAttribute('src');
  player.load(); // load() after removing src fully resets the element

  // Set new source
  const videoUrl = '/api/video/' + encodeURIComponent(file);
  player.src = videoUrl;
  player.style.display = 'block';
  placeholder.style.display = 'none';

  // Start loading the new video
  player.load();

  // Wait for enough data to load before calling play()
  // Use 'loadeddata' which fires when the first frame is available
  let playStarted = false;

  function startPlay() {
    if (playStarted) return;
    playStarted = true;
    player.play().catch(err => {
      // Autoplay may be blocked by browser policy — this is usually benign
      console.warn('Play request was interrupted:', err.message);
    });
  }

  // If video is already loaded enough, play immediately
  if (player.readyState >= 3) {
    startPlay();
  } else {
    // Otherwise wait for data to load
    player.addEventListener('loadeddata', startPlay, { once: true });
    // Fallback: if loadeddata doesn't fire within 3s, try anyway
    setTimeout(() => {
      if (!playStarted) {
        startPlay();
      }
    }, 3000);
  }
}

// ======================== Toggle Chapter ========================
function toggleChapter(el) {
  el.classList.toggle('open');
}

// ======================== Render Course Info ========================
function renderCourseInfo(course) {
  infoArea.innerHTML = `
    <div class="video-title">${course.title}</div>
    <div class="video-meta">${course.subtitle} · ${course.total_videos} 个视频 · ${course.chapters.length} 个章节</div>
    <div class="video-desc">${course.description}</div>
    <div class="chapter-detail">
      <h4>📋 课程大纲</h4>
      <p>${course.chapters.map((ch,i) => `${i+1}. ${ch.title}（${ch.count}讲）`).join(' · ')}</p>
    </div>
    <div id="wikiDocArea"></div>
  `;
  loadWikiDoc(course);
}

// ======================== Render Video Info ========================
function renderVideoInfo(name, chapter) {
  infoArea.innerHTML = `
    <div class="video-title">${name}</div>
    <div class="video-meta">📂 ${chapter} · ${currentCourse?.title || ''}</div>
    <div class="video-desc">正在播放该视频，您可以通过右侧目录切换到其他章节和视频。</div>
    <div id="wikiDocArea"></div>
  `;
  if (currentCourse) loadWikiDoc(currentCourse);
}

// ======================== Load Wiki Doc ========================
async function loadWikiDoc(course) {
  const area = document.getElementById('wikiDocArea');
  if (!area) return;
  if (!course.wiki_doc) return;

  area.innerHTML = '<div style="text-align:center;padding:24px 0;color:var(--text3);font-size:13px">⏳ 正在加载配套教材...</div>';
  try {
    const res = await fetch('/wiki_resources/' + course.wiki_doc);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const md = await res.text();
    const parsedHtml = Wiki.parse(md);
    area.innerHTML = `
      <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
        <h4 style="font-size:14px;color:var(--text3);margin-bottom:14px">📖 配套教材</h4>
        <div class="resource-content">${parsedHtml}</div>
      </div>`;
  } catch(e) {
    area.innerHTML = `<div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border)"><p style="color:#f87171;font-size:13px">❌ 配套教材加载失败: ${e.message}</p></div>`;
  }
}

// ======================== Watched State (localStorage) ========================
function getWatched(file) {
  try {
    const key = 'zl_watched_' + btoa(file.substring(0,80));
    return localStorage.getItem(key) === '1';
  } catch(e) { return false; }
}
function markWatched(file) {
  try {
    const key = 'zl_watched_' + btoa(file.substring(0,80));
    localStorage.setItem(key, '1');
    // Update sidebar icon
    document.querySelectorAll('.video-item').forEach(el => {
      if (el.dataset.file === file) {
        const st = el.querySelector('.vstatus');
        if (st && !st.classList.contains('playing')) {
          st.className = 'vstatus watched';
          st.textContent = '✓';
        }
      }
    });
  } catch(e) {}
}

// ======================== Helpers ========================
function escapeAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ======================== Keyboard shortcut ========================
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' && player) {
    e.preventDefault();
    if (player.paused) player.play(); else player.pause();
  }
});
</script>
